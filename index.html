<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>야간자율학습 감독일자 확인</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { font-size: 20px; color: #333; margin-bottom: 20px; }
        input[type="text"] { width: 80%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; text-align: center; }
        button { background-color: #4CAF50; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; width: 85%; }
        button:hover { background-color: #45a049; }
        .result-area { display: none; text-align: left; }
        .month-section { margin-bottom: 20px; }
        .month-title { font-weight: bold; font-size: 18px; color: #2c3e50; border-bottom: 2px solid #4CAF50; padding-bottom: 5px; margin-bottom: 10px; }
        .date-list { list-style-type: none; padding: 0; margin: 0; }
        .date-list li { background: #e8f5e9; margin-bottom: 8px; padding: 12px; border-radius: 5px; color: #333; font-size: 15px; }
        .location-text { color: #d35400; font-weight: bold; }
        .back-btn { background-color: #888; margin-top: 20px; }
        #loading { display: none; color: #666; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container" id="loginScreen">
    <h1>야간자율학습 감독 확인</h1>
    <input type="text" id="teacherName" placeholder="선생님 성함을 입력하세요">
    <button onclick="checkDates()">감독일자 확인</button>
    <div id="loading">데이터를 불러오는 중입니다...</div>
</div>

<div class="container result-area" id="resultScreen">
    <h1 id="resultTitle"></h1>
    <div id="resultsContainer"></div>
    <button class="back-btn" onclick="goBack()">다시 검색하기</button>
</div>

<script>
    // [설정] 구글 스프레드시트 ID
    const SHEET_ID = '1nKjVnDDEWXcRGo4ka6aYb7U3mxZ7ouSJD-qmSmQImKY';
    
    // [중요] 선생님의 구글 API 키 적용 완료
    const API_KEY = 'AIzaSyBzE09gR37WosPsArNy-IXhwsgUWqtEu7M'; 

    async function checkDates() {
        const nameInput = document.getElementById('teacherName').value.trim();
        if (!nameInput) {
            alert('이름을 입력해주세요.');
            return;
        }

        document.getElementById('loading').style.display = 'block';

        try {
            const metaUrl = 'https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '?key=' + API_KEY;
            const metaResponse = await fetch(metaUrl);
            const metaData = await metaResponse.json();
            
            if (metaData.error) throw new Error(metaData.error.message);

            const sheetTitles = metaData.sheets.map(function(sheet) {
                return sheet.properties.title;
            });

            const now = new Date();
            const currentMonthNum = now.getMonth() + 1;
            const nextMonthNum = currentMonthNum === 12 ? 1 : currentMonthNum + 1;

            const currentMonthSheet = sheetTitles.find(function(t) { return t.includes(currentMonthNum + '월'); });
            const nextMonthSheet = sheetTitles.find(function(t) { return t.includes(nextMonthNum + '월'); });

            let finalHtml = '';

            if (currentMonthSheet) {
                const dates = await fetchSheetAndFindDates(currentMonthSheet, nameInput);
                finalHtml += buildMonthHtml(currentMonthNum + '월', dates);
            } else {
                finalHtml += buildMonthHtml(currentMonthNum + '월', null);
            }

            if (nextMonthSheet) {
                const dates = await fetchSheetAndFindDates(nextMonthSheet, nameInput);
                finalHtml += buildMonthHtml(nextMonthNum + '월', dates);
            } else {
                finalHtml += buildMonthHtml(nextMonthNum + '월', null);
            }

            document.getElementById('resultTitle').innerText = nameInput + ' 선생님 감독일정';
            document.getElementById('resultsContainer').innerHTML = finalHtml;
            
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'block';

        } catch (error) {
            console.error(error);
            alert('데이터를 가져오는데 실패했습니다. API 키나 공유 설정을 확인해주세요.\n' + error.message);
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }

    async function fetchSheetAndFindDates(sheetName, targetName) {
        const dataUrl = 'https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/' + sheetName + '!A:Z?key=' + API_KEY;
        const response = await fetch(dataUrl);
        const json = await response.json();
        const rows = json.values;
        
        let foundDates = [];
        
        if (!rows || rows.length === 0) return foundDates;

        const headers = rows[0];

        for (let i = 1; i < rows.length; i++) {
            const row = rows[i];
            if (!row || row.length === 0) continue;
            
            for (let j = 1; j < row.length; j++) {
                if (row[j] && row[j].replace(/\s/g, '').includes(targetName.replace(/\s/g, ''))) {
                    
                    let date = row[0] ? row[0] : '';
                    let day = '';
                    let location = headers[j] ? headers[j] : j + '열';
                    
                    if (j >= 2 && row[1] && row[1].length <= 3) {
                        day = row[1];
                    }

                    let displayText = date;
                    if (day) displayText += ' (' + day + ')';
                    if (location) displayText += ' ➡️ <span class="location-text">' + location + '</span>';

                    foundDates.push(displayText);
                    break;
                }
            }
        }
        return foundDates;
    }

    function buildMonthHtml(monthLabel, dates) {
        let html = '<div class="month-section"><div class="month-title">' + monthLabel + '</div>';
        if (!dates) {
            html += '<p style="color:#7f8c8d; font-size: 14px;">해당 월의 시트가 존재하지 않습니다.</p>';
        } else if (dates.length === 0) {
            html += '<p style="color:#7f8c8d; font-size: 14px;">배정된 감독일이 없습니다.</p>';
        } else {
            html += '<ul class="date-list">';
            for (let i = 0; i < dates.length; i++) {
                html += '<li>' + dates[i] + '</li>';
            }
            html += '</ul>';
        }
        html += '</div>';
        return html;
    }

    function goBack() {
        document.getElementById('teacherName').value = '';
        document.getElementById('resultScreen').style.display = 'none';
        document.getElementById('loginScreen').style.display = 'block';
    }
</script>

</body>
</html>
