<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>야간자율학습 감독일자 확인</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 95%; max-width: 800px; text-align: center; box-sizing: border-box; }
        
        #loginScreen, #adminLoginScreen { max-width: 380px; padding: 40px 20px; }
        
        #resultScreen, #adminScreen, #superAdminScreen { max-width: 1400px; width: 98%; }
        
        h1 { font-size: 22px; color: #333; margin-bottom: 25px; }
        .input-group { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        
        input[type="text"], input[type="password"] { width: 85%; padding: 14px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; text-align: center; box-sizing: border-box; transition: 0.3s; }
        input[type="text"]:focus, input[type="password"]:focus { border-color: #4CAF50; outline: none; box-shadow: 0 0 5px rgba(76, 175, 80, 0.3); }
        
        button { width: 85%; background-color: #4CAF50; color: white; border: none; padding: 14px 20px; font-size: 15px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 10px; transition: 0.2s; box-sizing: border-box;}
        button.cal-btn { background-color: #3498db; }
        
        .admin-link-box { width: 85%; margin: 0 auto; text-align: right; }
        button.admin-btn { background-color: transparent; color: #7f8c8d; font-size: 13px; font-weight: normal; text-decoration: underline; width: auto; padding: 5px; margin-top: 5px; }
        button.admin-btn:hover { color: #34495e; background-color: transparent; }
        
        button.save-btn { background-color: #e74c3c; width: auto; padding: 10px 20px; margin: 0; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        button:hover { opacity: 0.9; }
        .back-btn { background-color: #7f8c8d; width: 85%; padding: 12px 20px; margin-top: 20px; }
        
        #loading { display: none; color: #e67e22; font-weight: bold; font-size: 14px; margin-top: 15px; }
        
        .month-filter-container { display: none !important; }
        
        .result-area, #adminLoginScreen, #adminScreen, #superAdminScreen { display: none; text-align: left; }
        .month-section { margin-bottom: 20px; }
        .month-title { font-weight: bold; font-size: 17px; color: #2c3e50; border-bottom: 2px solid #4CAF50; padding-bottom: 5px; margin-bottom: 10px; }
        .date-list { list-style-type: none; padding: 0; margin: 0; }
        .date-list li { background: #e8f5e9; margin-bottom: 6px; padding: 10px; border-radius: 5px; color: #333; font-size: 14px; line-height: 1.4; }
        .error-text { color: #e74c3c; font-weight: bold; text-align: center; margin-top: 20px; }
        
        .calendar-header { display: flex; justify-content: center; align-items: center; margin-bottom: 10px; }
        .cal-nav-btn { background-color: #f39c12; width: auto; padding: 6px 12px; font-size: 14px; margin: 0 15px; }
        
        .calendar-table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
        .calendar-table th, .calendar-table td { border: 1px solid #ddd; padding: 2px; vertical-align: top; height: 60px; overflow: hidden; }
        .calendar-table th { background-color: #f8f9fa; text-align: center; height: auto; padding: 6px 0; font-size: 13px; }
        .calendar-table th:first-child, .calendar-table td:first-child { color: red; } 
        .calendar-table th:last-child, .calendar-table td:last-child { color: blue; } 
        
        .cal-date { font-weight: bold; margin-bottom: 2px; text-align: left; font-size: 13px; }
        
        .cal-item { border-radius: 3px; margin-bottom: 1px; border-left: 3px solid #ccc; display: flex; align-items: center; padding: 1px; min-height: 18px; }
        
        .draggable-name { cursor: grab; background-color: rgba(255,255,255,0.8); border: 1px dashed #aaa; padding: 1px 2px; border-radius: 3px; display: inline-block; margin: 1px; transition: 0.2s; font-weight:bold; font-size:11px; z-index: 10;}
        .draggable-name:active { cursor: grabbing; opacity: 0.5; }
        
        .drop-zone { min-height: 18px; padding: 1px; flex-grow: 1; display: flex; flex-wrap: wrap; align-items: center;}
        .drop-zone.over { background-color: rgba(243, 156, 18, 0.3); border-radius: 4px; border: 2px dashed #f39c12;}

        .admin-table { width: 100%; border-collapse: collapse; margin-top: 15px; margin-bottom: 15px; }
        .admin-table th, .admin-table td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        .admin-table th { background-color: #2c3e50; color: white; }
        .del-btn { background-color: #e74c3c; width: auto; padding: 6px 12px; font-size: 13px; margin: 0; }
        .add-btn { background-color: #27ae60; width: auto; padding: 12px 20px; font-size: 15px; margin: 0; }

        .layout-wrapper { display: flex; gap: 20px; align-items: stretch; }
        
        #myScheduleArea { flex: 1; min-width: 250px; border-right: 1px solid #eee; padding-right: 20px; display: flex; flex-direction: column; }
        #resultsContainer { flex-grow: 1; }
        #calendarArea { flex: 3.5; min-width: 600px; }

        @media (max-width: 950px) {
            .layout-wrapper { flex-direction: column; }
            #myScheduleArea { border-right: none; border-bottom: 2px dashed #eee; padding-right: 0; padding-bottom: 20px; width: 100%; }
            #calendarArea { width: 100%; min-width: auto; }
            .calendar-table th, .calendar-table td { padding: 1px; height: 50px; }
        }
    </style>
</head>
<body>

<div class="container" id="loginScreen">
    <h1>🏫 감독 일정 확인</h1>
    <div class="input-group">
        <input type="text" id="teacherName" placeholder="선생님 성함을 입력하세요" style="ime-mode: active;" onkeyup="if(window.event.keyCode==13){searchAndShowBoth()}">
        <button onclick="searchAndShowBoth()">내 일정 검색</button>
    </div>
    
    <div style="display: flex; flex-direction: column; align-items: center;">
        <button class="cal-btn" onclick="showCalendarOnly()">전체 달력 보기</button>
    </div>
    
    <div class="admin-link-box">
        <button class="admin-btn" onclick="switchScreen('adminLoginScreen')">⚙️ 관리자 모드</button>
    </div>
    <div id="loading">데이터를 불러오는 중입니다...</div>
</div>

<div class="container result-area" id="resultScreen">
    <div class="layout-wrapper">
        
        <div id="myScheduleArea">
            <h1 id="resultTitle" style="text-align: center; margin-top: 0; font-size: 19px;"></h1>
            <div id="resultsContainer"></div>
            <div class="month-filter-container" id="monthFilterContainer"></div>
        </div>
        
        <div id="calendarArea">
            <h1 style="text-align: center; color: #2c3e50; margin-top: 0; margin-bottom: 10px; font-size: 19px;">📅 전체 감독 달력</h1>
            <div class="calendar-header">
                <button class="cal-nav-btn" onclick="changeMonth(-1, false)">◀ 이전</button>
                <span id="calendarTitle" style="font-size:20px; font-weight:bold;"></span>
                <button class="cal-nav-btn" onclick="changeMonth(1, false)">다음 ▶</button>
            </div>
            <div id="calendarContainer"></div>
        </div>
        
    </div>
    
    <div style="text-align: center; margin-top: 25px; border-top: 1px solid #eee; padding-top: 20px;">
        <button class="back-btn" style="width:auto; padding:10px 30px; margin:0;" onclick="goBack()">처음으로 돌아가기</button>
    </div>
</div>

<div class="container" id="adminLoginScreen">
    <h1>⚙️ 관리자 로그인</h1>
    <div class="input-group" style="border-bottom: none; margin-bottom: 0; padding-bottom: 0;">
        <input type="text" id="adminId" placeholder="관리자 이름" style="ime-mode: active;">
        <input type="password" id="adminPw" placeholder="비밀번호" style="ime-mode: disabled;" onkeyup="if(window.event.keyCode==13){adminLogin()}">
        <button style="background-color: #34495e;" onclick="adminLogin()">로그인</button>
    </div>
    <div style="display: flex; justify-content: center;">
        <button class="back-btn" onclick="goBack()">돌아가기</button>
    </div>
</div>

<div class="container" id="adminScreen">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 10px;">
        <h1 style="color: #e74c3c; margin:0;">🛠️ 관리자 모드 (드래그 저장)</h1>
        <div style="display: flex; gap: 10px;">
            <button id="superAdminBtn" class="save-btn" style="background-color: #2980b9; display: none;" onclick="openSuperAdminMenu()">👑 계정 관리</button>
            <button class="save-btn" style="background-color: #8e44ad;" onclick="changeAdminPassword()">🔑 비번 변경</button>
            <button class="save-btn" onclick="saveAdminChanges()">💾 저장하기</button>
        </div>
    </div>
    
    <div class="calendar-header">
        <button class="cal-nav-btn" onclick="changeMonth(-1, true)">◀ 이전</button>
        <span id="adminCalendarTitle" style="font-size:20px; font-weight:bold;"></span>
        <button class="cal-nav-btn" onclick="changeMonth(1, true)">다음 ▶</button>
    </div>
    <div id="adminCalendarContainer"></div>
    <div style="text-align: center;"><button class="back-btn" style="width:auto; padding:10px 30px;" onclick="goBack()">로그아웃 및 돌아가기</button></div>
</div>

<div class="container" id="superAdminScreen">
    <div style="display: flex; justify-content: center; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 10px;">
        <h1 style="color: #2980b9; margin:0;">👑 최고관리자: 계정 관리</h1>
    </div>
    
    <table class="admin-table">
        <thead>
            <tr>
                <th>관리자 이름(ID)</th>
                <th>비밀번호</th>
                <th>관리</th>
            </tr>
        </thead>
        <tbody id="adminListBody"></tbody>
    </table>

    <div style="display: flex; justify-content: center; gap: 10px; margin-bottom: 5px;">
        <input type="text" id="newAdminId" placeholder="새 관리자 이름" style="width: 50%; margin-bottom: 0;" style="ime-mode: active;">
        <button class="add-btn" onclick="addNewAdmin()">➕ 추가하기</button>
    </div>
    <p style="text-align: center; font-size: 13px; color: #7f8c8d; margin-top: 0; margin-bottom: 20px;">* 계정을 <b>추가, 삭제, 초기화</b> 하면 구글 시트에 <b>자동으로 저장</b>됩니다.</p>

    <div style="text-align: center;"><button class="back-btn" style="width:auto; padding:10px 30px;" onclick="switchScreen('adminScreen')">캘린더로 돌아가기</button></div>
</div>

<!-- ★ 스크립트 캐시 방지 버전 v=21 로 업데이트 완료 ★ -->
<script src="js/config.js?v=21"></script>
<script src="js/api.js?v=21"></script>
<script src="js/ui.js?v=21"></script>
<script src="js/search.js?v=21"></script>
<script src="js/calendar.js?v=21"></script>
<script src="js/admin.js?v=21"></script>

<script>
    function updateMyScheduleDisplay() {
        const sections = document.querySelectorAll('.month-section');
        if (!sections || sections.length === 0) return;

        // 캘린더에 표시된 당월 계산
        const currentMonth = currentCalMonth;
        let nextMonth = currentMonth === 12 ? 1 : currentMonth + 1;
        
        // ★ 핵심 수정: 2월인 경우 학년도가 종료되므로 다음 달(3월)을 표시하지 않음
        if (currentMonth === 2) {
            nextMonth = -1; 
        }
        
        let visibleCount = 0;

        sections.forEach(sec => {
            const titleEl = sec.querySelector('.month-title');
            if (titleEl) {
                const titleText = titleEl.innerText.trim();
                const match = titleText.match(/(\d+)월/);
                
                if (match) {
                    const secMonth = parseInt(match[1], 10);
                    // 당월이거나 익월일 때만 표시 (2월일 때는 당월만 매칭됨)
                    if (secMonth === currentMonth || secMonth === nextMonth) {
                        sec.style.display = 'block';
                        visibleCount++;
                    } else {
                        sec.style.display = 'none';
                    }
                } else {
                    sec.style.display = 'none'; 
                }
            }
        });
        
        const resultsContainer = document.getElementById('resultsContainer');
        let emptyMsg = document.getElementById('emptyScheduleMsg');
        
        if (visibleCount === 0 && sections.length > 0) {
            if (!emptyMsg) {
                emptyMsg = document.createElement('p');
                emptyMsg.id = 'emptyScheduleMsg';
                emptyMsg.style.textAlign = 'center';
                emptyMsg.style.color = '#7f8c8d';
                emptyMsg.style.marginTop = '20px';
                resultsContainer.appendChild(emptyMsg);
            }
            
            // ★ 메시지 분기 처리: 2월일 때는 단독 메시지로 깔끔하게 표시
            if (currentMonth === 2) {
                emptyMsg.innerText = `선택하신 2월에는 배정된 일정이 없습니다.`;
            } else {
                emptyMsg.innerText = `선택하신 ${currentMonth}월과 ${nextMonth}월에는 배정된 일정이 없습니다.`;
            }
            emptyMsg.style.display = 'block';
        } else if (emptyMsg) {
            emptyMsg.style.display = 'none';
        }
    }

    async function searchAndShowBoth() {
        try {
            const nameInput = document.getElementById('teacherName');
            if (!nameInput || !nameInput.value.trim()) {
                alert('선생님 성함을 입력하세요.');
                return;
            }
            
            const scheduleArea = document.getElementById('myScheduleArea');
            if (scheduleArea) {
                scheduleArea.style.display = 'flex'; 
            }
            
            if (typeof checkDates === 'function') {
                let res = checkDates();
                if (res instanceof Promise) await res;
            }
            
            if (typeof initCalendar === 'function') {
                await initCalendar(false);
            }
        } catch (e) {
            console.log("통합 화면 표시 중 문제 발생(무시됨):", e);
        }
    }

    async function showCalendarOnly() {
        try {
            const scheduleArea = document.getElementById('myScheduleArea');
            if (scheduleArea) {
                scheduleArea.style.display = 'none';
            }
            
            if (typeof initCalendar === 'function') {
                await initCalendar(false);
            }
        } catch (e) {
            console.log("달력 표시 중 문제 발생(무시됨):", e);
        }
    }
</script>
</body>
</html>
